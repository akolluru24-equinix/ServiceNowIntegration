name: ServiceNow CI/CD (CLI)

on:
  workflow_dispatch: {}
  push:
    branches: [ main ]

jobs:
  export-and-deploy:
    runs-on: ubuntu-latest
    env:
      SN_APP_SCOPE: ${{ secrets.SN_APP_SCOPE }}
      SN_APP_SYSID: ${{ secrets.SN_APP_SYSID }}
      SN_DEV1_INSTANCE_URL: ${{ secrets.SN_DEV1_INSTANCE_URL }}
      SN_DEV1_USERNAME: ${{ secrets.SN_DEV1_USERNAME }}
      SN_DEV1_PASSWORD: ${{ secrets.SN_DEV1_PASSWORD }}
      SN_DEV2_INSTANCE_URL: ${{ secrets.SN_DEV2_INSTANCE_URL }}
      SN_DEV2_USERNAME: ${{ secrets.SN_DEV2_USERNAME }}
      SN_DEV2_PASSWORD: ${{ secrets.SN_DEV2_PASSWORD }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        persist-credentials: true

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install ServiceNow CLI
      run: |
        set -e
        echo "Installing @servicenow/cli"
        npm install -g @servicenow/cli
        npx --no-install @servicenow/cli --version || true

    - name: Validate Dev1 credentials
      id: validate-dev
      run: |
        set -euo pipefail
        # Normalize instance URL: allow secrets that are hostnames (dev1.example.com)
        DEV1_URL="${SN_DEV1_INSTANCE_URL}"
        if ! [[ "$DEV1_URL" =~ ^https?:// ]]; then
          DEV1_URL="https://${DEV1_URL}"
        fi
        echo "Validating connectivity to ${DEV1_URL}"
        # Basic REST validation using a light endpoint to check auth and connectivity
        curl -sS -u "${SN_DEV1_USERNAME}:${SN_DEV1_PASSWORD}" \
          -H "Accept: application/json" \
          "${DEV1_URL}/api/now/table/sys_user?sysparm_limit=1" -o /tmp/dev1_check.json || true
        echo "Response preview:" && head -n 50 /tmp/dev1_check.json || true
        jq -r '.result[0].sys_id' /tmp/dev1_check.json || true

    - name: Export application (ServiceNow CLI)
      id: export-cli
      run: |
        set -euo pipefail
        # Normalize DEV1 URL
        DEV1_URL="${SN_DEV1_INSTANCE_URL}"
        if ! [[ "$DEV1_URL" =~ ^https?:// ]]; then
          DEV1_URL="https://${DEV1_URL}"
        fi
        echo "Exporting application scope ${SN_APP_SCOPE} from ${DEV1_URL}"

        echo "--- DEBUG: show installed CLI version and app help ---"
        npx @servicenow/cli --version || true
        npx @servicenow/cli --help || true
        npx @servicenow/cli app --help || true

        # Login to dev1 (adjust command if the CLI uses a different auth verb)
        echo "Logging into Dev1"
        npx @servicenow/cli auth login --instance "${DEV1_URL}" --username "${SN_DEV1_USERNAME}" --password "${SN_DEV1_PASSWORD}"

        # Try the common export forms in order until one produces a file
        mkdir -p servicenow-exports

        echo "Attempting: app export --scope (capture stdout/stderr)"
        # capture stdout/stderr to temporary files for inspection
        /bin/bash -c 'npx @servicenow/cli app export --scope "${SN_APP_SCOPE}" --output "servicenow-exports/${SN_APP_SCOPE}.zip"' > /tmp/sn_export_out.log 2> /tmp/sn_export_err.log || true
        if grep -qE "Exported|Success|created|Wrote" /tmp/sn_export_out.log /tmp/sn_export_err.log 2>/dev/null; then
          echo "App export command produced messages"
        else
          echo "No clear success message from app export"
        fi

        echo "Contents of sn_export_out.log:" && sed -n '1,200p' /tmp/sn_export_out.log || true
        echo "Contents of sn_export_err.log:" && sed -n '1,200p' /tmp/sn_export_err.log || true

        # If zip not present, try alternate export verb and capture
        if [ ! -f "servicenow-exports/${SN_APP_SCOPE}.zip" ]; then
          echo "Trying alternate 'app export-zip' (capture stdout/stderr)"
          /bin/bash -c 'npx @servicenow/cli app export-zip --scope "${SN_APP_SCOPE}" --output "servicenow-exports/${SN_APP_SCOPE}.zip"' > /tmp/sn_export_out2.log 2> /tmp/sn_export_err2.log || true
          echo "sn_export_out2.log:" && sed -n '1,200p' /tmp/sn_export_out2.log || true
          echo "sn_export_err2.log:" && sed -n '1,200p' /tmp/sn_export_err2.log || true
        fi

        # If still no zip, try generate-update-set and capture output
        if [ ! -f "servicenow-exports/${SN_APP_SCOPE}.zip" ]; then
          echo "No zip produced — trying generate-update-set (capture stdout/stderr)"
          /bin/bash -c 'npx @servicenow/cli generate-update-set --scope "${SN_APP_SCOPE}" --output "servicenow-exports/${SN_APP_SCOPE}.xml"' > /tmp/sn_export_out3.log 2> /tmp/sn_export_err3.log || true
          echo "sn_export_out3.log:" && sed -n '1,200p' /tmp/sn_export_out3.log || true
          echo "sn_export_err3.log:" && sed -n '1,200p' /tmp/sn_export_err3.log || true
        fi

        echo "Full workspace files (top-level, 4 levels):" && find . -maxdepth 4 -type f -ls | sed -n '1,200p' || true
        echo "Export folder listing:" && ls -lah servicenow-exports || true

        # Prefer zip if present, else xml
        if [ -f "servicenow-exports/${SN_APP_SCOPE}.zip" ]; then
          echo "Exported file check:" && ls -l servicenow-exports/${SN_APP_SCOPE}.zip || (echo "Export failed or file missing" && exit 1)
        elif [ -f "servicenow-exports/${SN_APP_SCOPE}.xml" ]; then
          echo "Exported XML check:" && ls -l servicenow-exports/${SN_APP_SCOPE}.xml || (echo "Export failed or file missing" && exit 1)
        else
          echo "Export failed or file missing" && echo "(see sn_export_out*.log and sn_export_err*.log)" && exit 1
        fi

    - name: Commit export if changed
      run: |
        set -e
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

        if [ -f "servicenow-exports/${SN_APP_SCOPE}.zip" ]; then
          git add servicenow-exports/${SN_APP_SCOPE}.zip
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update ServiceNow export for ${SN_APP_SCOPE}\n\nCo-authored-by: Copilot App <223556219+Copilot@users.noreply.github.com>" || true
            git push
          fi
        else
          echo "Export file missing; skipping commit"
        fi

    - name: Deploy to target (ServiceNow CLI)
      if: env.SN_DEV2_INSTANCE_URL != ''
      run: |
        set -euo pipefail
        if [ -z "${SN_DEV2_INSTANCE_URL}" ]; then
          echo "TARGET not set; skipping deploy"
          exit 0
        fi

        # Normalize DEV2 URL
        DEV2_URL="${SN_DEV2_INSTANCE_URL}"
        if ! [[ "$DEV2_URL" =~ ^https?:// ]]; then
          DEV2_URL="https://${DEV2_URL}"
        fi

        echo "Logging into target: ${DEV2_URL}"
        npx @servicenow/cli auth login --instance "${DEV2_URL}" --username "${SN_DEV2_USERNAME}" --password "${SN_DEV2_PASSWORD}"

        echo "Importing/Publishing app to target"
        # CLI subcommand names may vary; common verbs: app import / app publish
        npx @servicenow/cli app import --file "servicenow-exports/${SN_APP_SCOPE}.zip" || npx @servicenow/cli app publish --file "servicenow-exports/${SN_APP_SCOPE}.zip"

        echo "Deploy step finished; verify in target instance"

    - name: Workflow summary
      run: |
        echo "Export path: servicenow-exports/${SN_APP_SCOPE}.zip"
        echo "If any CLI command fails, update CLI command names to match the installed @servicenow/cli version."
